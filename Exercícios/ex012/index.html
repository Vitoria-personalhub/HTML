<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Insira vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor:</p>
    <video width="640" height="360" poster="imagens/capa_rockNroll.png" controls>
        <source src="media/rockrefactor.mp4" type="video/mp4">
        <source src="media/rockrefactor.m4v" type="video/mp4">
        <source src="media/rockrefactor.webm" type="video/webm">
        <source src="media/rockrefactor.ogv" type="video/ogg">
        Seu navegador não suporta o elemento de vídeo.
    </video>

    <h1>Inserindo vídeos do Vimeo</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/88081351?h=47507464bf" width="640" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>


    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=-DSVV6KQP64k6Sd0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>
</body>
</html>
